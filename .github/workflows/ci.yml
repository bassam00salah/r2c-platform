name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (user / partner / admin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Lint user
        run: npm run lint --workspace=apps/user

      - name: Lint partner
        run: npm run lint --workspace=apps/partner

      - name: Lint admin
        run: npm run lint --workspace=apps/admin

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm ci --prefix functions

      - name: Run functions tests
        run: npm test --prefix functions

      - name: Run shared tests
        run: npm test --workspace=packages/shared

  build:
    name: Build apps
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Build user
        run: npm run build --workspace=apps/user

      - name: Build partner
        run: npm run build --workspace=apps/partner

      - name: Build admin
        run: npm run build --workspace=apps/admin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-apps
          path: |
            apps/user/dist
            apps/partner/dist
            apps/admin/dist
          retention-days: 7

  deploy-admin-hosting:
    name: Deploy Admin Hosting
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-apps

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy admin hosting only
        run: firebase deploy --project "${{ secrets.FIREBASE_PROJECT_ID }}" --only hosting:admin --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy-backend:
    name: Deploy Functions and Firestore
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm ci --prefix functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions, firestore rules, and indexes
        run: firebase deploy --project "${{ secrets.FIREBASE_PROJECT_ID }}" --only functions,firestore:rules,firestore:indexes --token "${{ secrets.FIREBASE_TOKEN }}"
